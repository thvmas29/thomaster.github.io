<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>thomaster</title>
    <script>
      // GitHub Pages SPA redirect trick
      // Redirects 404s back to index.html with the path encoded as a query param
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + 1).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
