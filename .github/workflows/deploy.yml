name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Autorise GitHub Actions à déployer sur Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # On ne met pas "cache: 'npm'" ici pour éviter l'erreur de lockfile

      - name: Install Dependencies
        # Cette étape ne s'exécute que si tu as un package.json
        run: |
          if [ -f package.json ]; then
            npm install
          fi

      - name: Build Project
        # Si tu as un script de build (ex: Vite, React), il sera lancé ici
        run: |
          if [ -f package.json ]; then
            npm run build --if-present
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Si ton build génère un dossier (ex: 'dist' ou 'build'), remplace '.' par le nom du dossier
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
